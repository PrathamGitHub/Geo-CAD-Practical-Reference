<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="520" viewBox="0 0 1080 520" role="img" aria-label="Data to decisions in civil engineering">
  <defs>
    <style>
      .title { font: 700 28px 'Segoe UI', Arial, sans-serif; fill: #1b263b; }
      .subtitle { font: 500 16px 'Segoe UI', Arial, sans-serif; fill: #415a77; }
      .box { fill: #f8f9fa; stroke: #2a9d8f; stroke-width: 2; rx: 14; }
      .head { font: 700 18px 'Segoe UI', Arial, sans-serif; fill: #0b3c49; }
      .text { font: 500 14px 'Segoe UI', Arial, sans-serif; fill: #333333; }
      .arrow { stroke: #2a9d8f; stroke-width: 3; fill: none; marker-end: url(#m); }
    </style>
    <marker id="m" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#2a9d8f"/>
    </marker>
  </defs>

  <rect width="1080" height="520" fill="#ffffff"/>
  <text x="40" y="56" class="title">From Raw Data to Better Civil Engineering Decisions</text>
  <text x="40" y="84" class="subtitle">A simple project flow: collect, combine, analyze, decide, execute</text>

  <rect x="40" y="130" width="180" height="250" class="box"/>
  <text x="60" y="164" class="head">1. Collect</text>
  <text x="60" y="194" class="text">Survey points</text>
  <text x="60" y="218" class="text">Drone imagery</text>
  <text x="60" y="242" class="text">Road alignment</text>
  <text x="60" y="266" class="text">Soil notes</text>
  <text x="60" y="290" class="text">Utility location</text>

  <rect x="250" y="130" width="180" height="250" class="box"/>
  <text x="270" y="164" class="head">2. Structure</text>
  <text x="270" y="194" class="text">Excel tables</text>
  <text x="270" y="218" class="text">CAD layers</text>
  <text x="270" y="242" class="text">Named fields</text>
  <text x="270" y="266" class="text">CRS assigned</text>
  <text x="270" y="290" class="text">Units cleaned</text>

  <rect x="460" y="130" width="180" height="250" class="box"/>
  <text x="480" y="164" class="head">3. Integrate</text>
  <text x="480" y="194" class="text">Load in QGIS</text>
  <text x="480" y="218" class="text">Overlay layers</text>
  <text x="480" y="242" class="text">Check mismatch</text>
  <text x="480" y="266" class="text">Find gaps</text>
  <text x="480" y="290" class="text">Prepare map</text>

  <rect x="670" y="130" width="180" height="250" class="box"/>
  <text x="690" y="164" class="head">4. Analyze</text>
  <text x="690" y="194" class="text">Distance and slope</text>
  <text x="690" y="218" class="text">Area and volume</text>
  <text x="690" y="242" class="text">Access checks</text>
  <text x="690" y="266" class="text">Conflict checks</text>
  <text x="690" y="290" class="text">Scenario compare</text>

  <rect x="880" y="130" width="160" height="250" class="box"/>
  <text x="900" y="164" class="head">5. Decide</text>
  <text x="900" y="194" class="text">Select route</text>
  <text x="900" y="218" class="text">Freeze levels</text>
  <text x="900" y="242" class="text">Estimate cost</text>
  <text x="900" y="266" class="text">Share outputs</text>
  <text x="900" y="290" class="text">Reduce rework</text>

  <path d="M220 255 L250 255" class="arrow"/>
  <path d="M430 255 L460 255" class="arrow"/>
  <path d="M640 255 L670 255" class="arrow"/>
  <path d="M850 255 L880 255" class="arrow"/>

  <text x="40" y="440" class="subtitle">Core idea: Better data quality early in the workflow prevents design changes and site errors later.</text>
</svg>
