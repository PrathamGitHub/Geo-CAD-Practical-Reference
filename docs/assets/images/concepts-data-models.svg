<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="500" viewBox="0 0 1040 500" role="img" aria-label="Basic geospatial data models">
  <defs>
    <style>
      .title { font: 700 28px 'Segoe UI', Arial, sans-serif; fill: #1f2937; }
      .head { font: 700 20px 'Segoe UI', Arial, sans-serif; fill: #111827; }
      .text { font: 500 14px 'Segoe UI', Arial, sans-serif; fill: #374151; }
      .card { fill: #f9fafb; stroke: #9ca3af; stroke-width: 2; rx: 14; }
      .grid { stroke: #cbd5e1; stroke-width: 1; }
    </style>
  </defs>

  <rect width="1040" height="500" fill="#ffffff"/>
  <text x="32" y="52" class="title">Basic Geospatial Data Models</text>

  <rect x="30" y="90" width="235" height="340" class="card"/>
  <text x="52" y="124" class="head">Point</text>
  <circle cx="148" cy="220" r="6" fill="#2563eb"/>
  <circle cx="112" cy="260" r="6" fill="#2563eb"/>
  <circle cx="184" cy="280" r="6" fill="#2563eb"/>
  <text x="52" y="352" class="text">Single locations</text>
  <text x="52" y="374" class="text">Examples: boreholes,</text>
  <text x="52" y="396" class="text">survey stations, poles</text>

  <rect x="285" y="90" width="235" height="340" class="card"/>
  <text x="307" y="124" class="head">Line</text>
  <polyline points="320,290 360,230 410,250 470,180" fill="none" stroke="#16a34a" stroke-width="5"/>
  <polyline points="320,320 355,300 390,315 450,300 485,315" fill="none" stroke="#16a34a" stroke-width="5"/>
  <text x="307" y="352" class="text">Linear features</text>
  <text x="307" y="374" class="text">Examples: roads,</text>
  <text x="307" y="396" class="text">drains, pipelines</text>

  <rect x="540" y="90" width="235" height="340" class="card"/>
  <text x="562" y="124" class="head">Polygon</text>
  <polygon points="585,300 650,230 720,255 705,320 610,335" fill="#fde68a" stroke="#d97706" stroke-width="4"/>
  <polygon points="570,210 610,180 640,205 605,235" fill="#bfdbfe" stroke="#2563eb" stroke-width="3"/>
  <text x="562" y="352" class="text">Area boundaries</text>
  <text x="562" y="374" class="text">Examples: plots,</text>
  <text x="562" y="396" class="text">buildings, water bodies</text>

  <rect x="795" y="90" width="215" height="340" class="card"/>
  <text x="817" y="124" class="head">Raster</text>
  <g transform="translate(822,170)">
    <rect x="0" y="0" width="160" height="160" fill="#ffffff" stroke="#64748b" stroke-width="2"/>
    <line x1="0" y1="32" x2="160" y2="32" class="grid"/>
    <line x1="0" y1="64" x2="160" y2="64" class="grid"/>
    <line x1="0" y1="96" x2="160" y2="96" class="grid"/>
    <line x1="0" y1="128" x2="160" y2="128" class="grid"/>
    <line x1="32" y1="0" x2="32" y2="160" class="grid"/>
    <line x1="64" y1="0" x2="64" y2="160" class="grid"/>
    <line x1="96" y1="0" x2="96" y2="160" class="grid"/>
    <line x1="128" y1="0" x2="128" y2="160" class="grid"/>
    <rect x="32" y="32" width="32" height="32" fill="#93c5fd"/>
    <rect x="64" y="64" width="32" height="32" fill="#60a5fa"/>
    <rect x="96" y="96" width="32" height="32" fill="#3b82f6"/>
  </g>
  <text x="817" y="352" class="text">Continuous surfaces</text>
  <text x="817" y="374" class="text">Examples: elevation,</text>
  <text x="817" y="396" class="text">imagery, heat maps</text>
</svg>
